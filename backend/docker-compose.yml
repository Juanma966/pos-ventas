services:
  postgres:
    image: postgres:16-alpine
    container_name: pos-ventas-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: pos_ventas
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
    volumes:
      - pos-ventas-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_ventas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pos-ventas-pgdata:
    name: pos-ventas-pgdata
